# docker-compose.yml - 完整修正版
services:
  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: always
    depends_on: &langfuse-depends-on
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    ports:
      # 这个是 worker 内部的监控端口, 绑定到 localhost 是安全的
      - 127.0.0.1:10961:10961
    environment: &langfuse-env
      # --- 🚨 请务必修改以下所有密钥和密码 ---
      DATABASE_URL: postgresql://postgres:<你的PostgreSQL密码>@postgres:5432/postgres
      SALT: "<你的唯一SALT值>"
      ENCRYPTION_KEY: "<你的64位十六进制加密密钥>" # 可通过 `openssl rand -hex 32` 命令生成
      CLICKHOUSE_PASSWORD: "<你的Clickhouse密码>"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "<你的Minio密钥>"
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "<你的Minio密钥>"
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: "<你的Minio密钥>"
      REDIS_AUTH: "<你的Redis密码>"
      # --- 密钥区域结束 ---

      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: ${LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES:-true}
      CLICKHOUSE_MIGRATION_URL: ${CLICKHOUSE_MIGRATION_URL:-clickhouse://clickhouse:9000}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: ${CLICKHOUSE_CLUSTER_ENABLED:-false}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_EVENT_UPLOAD_REGION:-auto}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: ${LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT:-http://minio:9000}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: ${LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE:-true}
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_MEDIA_UPLOAD_BUCKET:-langfuse}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: ${LANGFUSE_S3_MEDIA_UPLOAD_REGION:-auto}
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID:-minio}
      # ✅ 已修正: 使用内部服务名 'minio' 和内部端口 '9000'
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: ${LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT:-http://minio:9000}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: ${LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE:-true}
      LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT: ${LANGFUSE_S3_BATCH_EXPORT_EXTERNAL_ENDPOINT:-http://<你的服务器IP>:9090}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: always
    depends_on: *langfuse-depends-on
    ports:
      # 映射主机端口 10962 到容器的 3000 端口, 用于外部访问
      - "10962:3000"
    environment:
      <<: *langfuse-env
      # ✅ 已修正: 使用你服务器的公网IP或域名
      NEXTAUTH_URL: "http://<你的服务器IP>:10962"
      # 🚨 请务必修改此密钥
      NEXTAUTH_SECRET: "<你的唯一NEXTAUTH密钥>"

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      # 🚨 修改这里，并确保它与上面环境配置中的密码一致
      CLICKHOUSE_PASSWORD: "<你的Clickhouse密码>"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    # ✅ 已移除: 不再需要将内部端口映射到主机
    # ports:
    #   - 127.0.0.1:8123:8123
    #   - 127.0.0.1:9000:9000
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: docker.io/minio/minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      # 🚨 修改这里，并确保它与上面环境配置中的密钥一致
      MINIO_ROOT_PASSWORD: "<你的Minio密钥>"
    ports:
      - 9090:9000          # Minio API 端口, 用于外部访问
      - 127.0.0.1:9091:9001 # Minio 控制台端口, 仅限本机访问
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/redis:7
    restart: always
    # 🚨 修改这里，并确保它与上面环境配置中的密码一致
    command: >
      --requirepass <你的Redis密码>
    # ✅ 已移除: 不再需要将内部端口映射到主机
    # ports:
    #  - 127.0.0.1:6379:6379
    healthcheck:
      # 健康检查中也需要密码
      test: ["CMD", "redis-cli", "-a", "<你的Redis密码>", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  postgres:
    image: docker.io/postgres:${POSTGRES_VERSION:-16} # 建议使用一个具体的版本号
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      # 🚨 修改这里，并确保它与 DATABASE_URL 中的密码一致
      POSTGRES_PASSWORD: "<你的PostgreSQL密码>"
      POSTGRES_DB: postgres
    # ✅ 已移除: 不再需要将内部端口映射到主机, 解决端口冲突
    # ports:
    #   - 127.0.0.1:5432:5432
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
